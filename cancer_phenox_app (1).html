<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cancer PhoenX</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --fire1:#ff6a00;--fire2:#ee0979;--fire3:#ffb347;
  --gold:#f5c842;--gold-dim:#c9972a;
  --cyan:#00c6ff;--cyan-dim:#0080a0;
  --void:#04060f;--void2:#080d1a;--void3:#0d1428;--void4:#131d35;
  --surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);
  --border-fire:rgba(255,106,0,0.25);--border-cyan:rgba(0,198,255,0.2);
  --text:#f0e8d8;--text-muted:#8a8070;--text-dim:#5a5248;
  --danger:#ff4444;
}
body{font-family:'Raleway',sans-serif;background:var(--void);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 50% at 10% 0%,rgba(255,80,0,0.08) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 90% 100%,rgba(0,180,255,0.07) 0%,transparent 60%),radial-gradient(ellipse 40% 30% at 50% 50%,rgba(20,5,0,0.9) 0%,transparent 100%);pointer-events:none;}
#root{position:relative;z-index:1;}
h1,h2,h3,.cinzel{font-family:'Cinzel',serif;}
.cinzel-deco{font-family:'Cinzel Decorative',serif;}

/* AUTH */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;}
.auth-screen::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 100% 100% at 50% 50%,rgba(255,80,0,0.06) 0%,transparent 70%);animation:breathe 6s ease-in-out infinite;}
@keyframes breathe{0%,100%{opacity:0.5}50%{opacity:1}}

.auth-logo-wrap{text-align:center;margin-bottom:2rem;}

.phoenix-img-wrap{
  width:140px;height:140px;margin:0 auto 1rem;
  border-radius:50%;
  overflow:hidden;
  border:2px solid rgba(255,106,0,0.4);
  box-shadow:0 0 30px rgba(255,100,0,0.5),0 0 60px rgba(255,50,0,0.2),inset 0 0 20px rgba(0,0,0,0.3);
  animation:glow-pulse 3s ease-in-out infinite;
  position:relative;
}
.phoenix-img-wrap img{width:100%;height:100%;object-fit:cover;object-position:center top;}

.topbar-phoenix-img{
  width:38px;height:38px;
  border-radius:50%;
  overflow:hidden;
  border:1.5px solid rgba(255,106,0,0.5);
  box-shadow:0 0 12px rgba(255,100,0,0.5);
  flex-shrink:0;
}
.topbar-phoenix-img img{width:100%;height:100%;object-fit:cover;object-position:center top;}

@keyframes glow-pulse{0%,100%{box-shadow:0 0 30px rgba(255,100,0,0.5),0 0 60px rgba(255,50,0,0.2)}50%{box-shadow:0 0 50px rgba(255,140,0,0.8),0 0 100px rgba(255,80,0,0.4)}}

.auth-title{font-family:'Cinzel Decorative',serif;font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,var(--gold) 0%,var(--fire1) 50%,var(--fire2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px;}
.auth-sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--cyan);margin-top:4px;font-weight:300;}

.auth-box{background:linear-gradient(145deg,rgba(255,106,0,0.06),rgba(0,0,0,0.6),rgba(0,198,255,0.04));border:1px solid var(--border-fire);border-radius:20px;padding:3rem 2.5rem;width:100%;max-width:440px;backdrop-filter:blur(20px);box-shadow:0 0 60px rgba(255,80,0,0.08),0 0 100px rgba(0,0,0,0.5);position:relative;}

.auth-tabs{display:flex;background:rgba(0,0,0,0.5);border-radius:10px;padding:5px;gap:5px;margin-bottom:1.75rem;border:1px solid rgba(255,106,0,0.3);}
.auth-tab{flex:1;padding:10px 8px;border:none;border-radius:8px;font-family:'Raleway',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;background:transparent;color:rgba(255,255,255,0.5);}
.auth-tab:hover{color:rgba(255,255,255,0.8);background:rgba(255,106,0,0.1);}
.auth-tab.active{background:linear-gradient(135deg,rgba(255,106,0,0.5),rgba(238,9,121,0.3));color:#fff;border:1px solid rgba(255,106,0,0.5);text-shadow:0 0 10px rgba(255,180,0,0.5);}

label{display:block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,200,100,0.7);margin-bottom:6px;}
input[type=text],input[type=email],input[type=password],textarea,select{width:100%;padding:11px 14px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,106,0,0.35);border-radius:10px;font-family:'Raleway',sans-serif;font-size:13px;color:#fff;outline:none;transition:all 0.2s;margin-bottom:1rem;}
input:focus,textarea:focus,select:focus{border-color:var(--fire1);box-shadow:0 0 0 3px rgba(255,106,0,0.15);background:rgba(255,255,255,0.1);}
select option{background:#1a0a02;color:var(--text);}
textarea{resize:vertical;min-height:80px;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 22px;border-radius:10px;font-family:'Raleway',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border:none;transition:all 0.18s;}

/* MAIN LOGIN BUTTON - very visible */
.btn-fire{background:linear-gradient(135deg,#ff6a00,#ee0979);color:#fff;width:100%;box-shadow:0 4px 20px rgba(255,80,0,0.4),0 0 0 1px rgba(255,160,0,0.3);font-size:14px;letter-spacing:2px;padding:14px 22px;}
.btn-fire:hover{box-shadow:0 4px 35px rgba(255,80,0,0.7),0 0 0 1px rgba(255,200,0,0.5);transform:translateY(-1px);}

/* GHOST - more visible */
.btn-ghost{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.85);border:1px solid rgba(255,255,255,0.25);font-size:12px;padding:9px 18px;}
.btn-ghost:hover{border-color:var(--fire1);color:#fff;background:rgba(255,106,0,0.15);}

.btn-cyan{background:linear-gradient(135deg,rgba(0,198,255,0.25),rgba(0,120,200,0.25));color:var(--cyan);border:1px solid rgba(0,198,255,0.4);font-size:12px;padding:9px 18px;}
.btn-cyan:hover{background:rgba(0,198,255,0.2);box-shadow:0 0 20px rgba(0,198,255,0.25);}

.btn-danger{background:rgba(255,68,68,0.12);color:#ff6b6b;border:1px solid rgba(255,68,68,0.35);font-size:12px;padding:9px 18px;}
.btn-sm{padding:7px 14px;font-size:11px;border-radius:8px;}

.err{color:#ff6b6b;font-size:12px;margin-bottom:1rem;background:rgba(255,68,68,0.1);padding:9px 12px;border-radius:8px;border:1px solid rgba(255,68,68,0.25);}

/* LAYOUT */
.app-layout{min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:linear-gradient(90deg,rgba(255,80,0,0.1) 0%,rgba(0,0,0,0.85) 50%,rgba(0,198,255,0.06) 100%);border-bottom:1px solid var(--border-fire);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);}
.topbar-logo{font-family:'Cinzel Decorative',serif;font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--fire1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:flex;align-items:center;gap:10px;letter-spacing:1px;}
.topbar-right{display:flex;align-items:center;gap:1rem;}

.notif-btn{position:relative;background:none;border:none;cursor:pointer;font-size:1.2rem;color:var(--text-muted);transition:all 0.2s;padding:6px;}
.notif-btn:hover{color:var(--gold);filter:drop-shadow(0 0 8px rgba(245,200,66,0.5));}
.notif-badge{position:absolute;top:2px;right:2px;width:16px;height:16px;background:linear-gradient(135deg,var(--fire1),var(--fire2));border-radius:50%;font-size:9px;color:white;font-weight:700;display:flex;align-items:center;justify-content:center;}

.user-pill{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);}
.user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,rgba(255,106,0,0.3),rgba(238,9,121,0.2));border:1px solid var(--border-fire);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;font-family:'Cinzel',serif;}
.admin-badge{background:linear-gradient(135deg,rgba(245,200,66,0.15),rgba(255,106,0,0.15));color:var(--gold);border:1px solid rgba(245,200,66,0.3);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;}

.main-content{display:flex;flex:1;}
.sidebar{width:230px;background:rgba(0,0,0,0.3);border-right:1px solid var(--border-fire);padding:1.5rem 0.75rem;flex-shrink:0;backdrop-filter:blur(10px);}
.nav-section-label{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);padding:0 10px;margin:1.5rem 0 0.5rem;font-family:'Cinzel',serif;}
.nav-section-label:first-child{margin-top:0;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all 0.15s;border:none;background:transparent;width:100%;text-align:left;letter-spacing:0.3px;}
.nav-item:hover{background:rgba(255,106,0,0.07);color:var(--text);}
.nav-item.active{background:linear-gradient(135deg,rgba(255,106,0,0.15),rgba(238,9,121,0.08));color:var(--gold);border:1px solid rgba(255,106,0,0.2);}
.nav-icon{font-size:15px;}

.page{flex:1;padding:2.5rem;max-width:900px;}
.card{background:linear-gradient(145deg,rgba(255,255,255,0.04),rgba(0,0,0,0.3));border-radius:16px;border:1px solid var(--border-fire);padding:1.5rem;margin-bottom:1.5rem;backdrop-filter:blur(10px);transition:border-color 0.2s,box-shadow 0.2s;}
.card:hover{border-color:rgba(255,106,0,0.4);box-shadow:0 0 30px rgba(255,80,0,0.05);}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;gap:1rem;}
.card-title{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold);font-weight:600;}

.task-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05);transition:all 0.2s;}
.task-item:last-child{border-bottom:none;}
.task-checkbox{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,106,0,0.3);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all 0.2s;background:transparent;}
.task-checkbox:hover{border-color:var(--fire1);box-shadow:0 0 10px rgba(255,106,0,0.3);}
.task-checkbox.checked{background:linear-gradient(135deg,var(--fire1),var(--fire2));border-color:var(--fire1);box-shadow:0 0 12px rgba(255,80,0,0.4);}
.task-checkbox.checked::after{content:'';width:5px;height:9px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);display:block;}
.task-content{flex:1;}
.task-name{font-size:13px;font-weight:600;color:var(--text);transition:all 0.2s;letter-spacing:0.2px;}
.task-name.done{text-decoration:line-through;color:var(--text-dim);}
.task-meta{font-size:11px;color:var(--text-dim);margin-top:3px;}
.task-note-preview{font-size:11px;color:var(--cyan-dim);margin-top:4px;font-style:italic;}
.task-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:13px;padding:4px;border-radius:6px;transition:all 0.15s;line-height:1;}
.icon-btn:hover{color:var(--cyan);background:rgba(0,198,255,0.1);}

.tag{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;font-family:'Cinzel',serif;}
.tag-workout{background:rgba(0,120,200,0.15);color:#60aaff;border:1px solid rgba(0,120,200,0.25);}
.tag-detox{background:rgba(0,180,100,0.12);color:#50d090;border:1px solid rgba(0,180,100,0.2);}
.tag-supplement{background:rgba(255,180,50,0.12);color:#ffb347;border:1px solid rgba(255,180,50,0.2);}

.progress-bar{height:5px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--fire1),var(--fire3));transition:width 0.5s ease;box-shadow:0 0 8px rgba(255,106,0,0.5);}

.section-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.5rem;}
.stat-card{background:linear-gradient(145deg,rgba(255,106,0,0.07),rgba(0,0,0,0.4));border:1px solid var(--border-fire);border-radius:12px;padding:1rem 1.25rem;text-align:center;}
.stat-num{font-family:'Cinzel',serif;font-size:1.8rem;color:var(--gold);line-height:1;text-shadow:0 0 20px rgba(245,200,66,0.4);}
.stat-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-top:4px;font-weight:500;}

.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem;backdrop-filter:blur(6px);}
.modal{background:linear-gradient(145deg,var(--void3),var(--void2));border:1px solid var(--border-fire);border-radius:18px;padding:2rem;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 0 60px rgba(255,80,0,0.15),0 0 120px rgba(0,0,0,0.8);}
.modal-title{font-family:'Cinzel',serif;font-size:1.25rem;color:var(--gold);margin-bottom:1.5rem;font-weight:600;}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:1.5rem;}

.page-title{font-family:'Cinzel',serif;font-size:1.8rem;margin-bottom:0.5rem;color:var(--gold);font-weight:700;text-shadow:0 0 30px rgba(245,200,66,0.3);}
.page-subtitle{color:var(--text-muted);font-size:13px;margin-bottom:2rem;}
.greeting-date{font-size:12px;color:var(--text-dim);margin-bottom:0.5rem;letter-spacing:1px;text-transform:uppercase;}
.empty-state{text-align:center;padding:3rem 2rem;color:var(--text-muted);}
.empty-icon{font-size:2.5rem;margin-bottom:1rem;filter:drop-shadow(0 0 15px rgba(255,150,0,0.5));}

.plan-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:rgba(255,106,0,0.1);color:var(--fire3);border:1px solid rgba(255,106,0,0.2);border-radius:8px;font-size:11px;font-weight:600;margin:3px;}
.hr{border:none;border-top:1px solid rgba(255,106,0,0.12);margin:1.5rem 0;}

.notif-panel{position:fixed;top:70px;right:1.5rem;width:360px;background:linear-gradient(145deg,var(--void3),var(--void2));border:1px solid var(--border-fire);border-radius:16px;box-shadow:0 0 50px rgba(0,0,0,0.8),0 0 30px rgba(255,80,0,0.1);z-index:500;overflow:hidden;max-height:500px;display:flex;flex-direction:column;}
.notif-header{padding:1rem 1.25rem;border-bottom:1px solid rgba(255,106,0,0.12);display:flex;align-items:center;justify-content:space-between;}
.notif-title{font-family:'Cinzel',serif;font-size:0.95rem;color:var(--gold);}
.notif-list{overflow-y:auto;flex:1;}
.notif-item{padding:1rem 1.25rem;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;gap:10px;align-items:flex-start;}
.notif-item.unread{background:rgba(255,106,0,0.04);}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--fire1);box-shadow:0 0 6px rgba(255,106,0,0.6);flex-shrink:0;margin-top:5px;}
.notif-dot.read{background:transparent;border:1px solid rgba(255,255,255,0.1);}
.notif-msg{font-size:12px;color:var(--text);line-height:1.5;}
.notif-time{font-size:10px;color:var(--text-dim);margin-top:3px;}
.notif-empty{padding:2rem;text-align:center;color:var(--text-dim);font-size:13px;}

.ai-btn-generating{opacity:0.6;cursor:not-allowed;animation:pulse-opacity 1s ease-in-out infinite;}
@keyframes pulse-opacity{0%,100%{opacity:0.6}50%{opacity:0.9}}
.remove-btn{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:16px;line-height:1;padding:0;transition:color 0.15s;}
.remove-btn:hover{color:var(--danger);}
</style>
</head>

async function callClaude(messages, system='') {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 300,
      system: system || 'You are a compassionate and motivating wellness coach for cancer recovery patients. Be concise, warm, and encouraging. Avoid clichés. Use vivid, powerful language.',
      messages })
  });
  const data = await res.json();
  return data.content?.[0]?.text || '';

  const removeUser = id => { if (!confirm('Remove warrior?')) return; DB.set('users',DB.get('users',[]).filter(u=>u.id!==id)); setUsers(DB.get('users',[]).filter(u=>u.role!=='admin')); };
  const broadcast = () => {
    if (!broadcastMsg.trim()) return;
    users.forEach(u=>addNotification(u.id,'📣 Coach message: '+broadcastMsg,'coach'));
    setBroadcastMsg('');
    alert('Message sent to '+users.length+' warriors!');
  };
  const generateBroadcast = async () => {
    setGenerating(true);
    try {
      const msg = await callClaude([{role:'user',content:'Write a short (2 sentences) powerful motivational broadcast message for cancer recovery warriors. Something that acknowledges the difficulty but ignites courage. Do not use clichés.'}]);
      setBroadcastMsg(msg);
    } catch { setBroadcastMsg('Could not generate — check API'); }
    setGenerating(false);
  };
  return React.createElement('div', { className:'page' },
    React.createElement('h1', { className:'page-title' }, '⚡ Warriors'),
    React.createElement('p', { className:'page-subtitle' }, 'Manage your clients and send motivational broadcasts'),
    React.createElement('div', { className:'card' },
      React.createElement('div', { className:'card-title', style:{marginBottom:12} }, '📣 Broadcast to all warriors'),
      React.createElement('textarea', { value:broadcastMsg, onChange:e=>setBroadcastMsg(e.target.value), placeholder:'Type a message to send to all clients...' }),
      React.createElement('div', { style:{display:'flex',gap:10} },
        React.createElement('button', { className:'btn btn-cyan btn-sm '+(generating?'ai-btn-generating':''), onClick:generateBroadcast, disabled:generating }, generating?'✦ Phoenix writes...':'✦ AI write message'),
        React.createElement('button', { className:'btn btn-fire btn-sm', onClick:broadcast }, 'Send to all'),
      )
    ),
    users.length===0
      ? React.createElement('div',{className:'empty-state'},React.createElement('div',{className:'empty-icon'},'⚡'),React.createElement('p',{style:{fontFamily:'Cinzel,serif',color:'var(--gold)'}},'No warriors yet'))
      : users.map(u=>React.createElement('div',{key:u.id,className:'card'},
          React.createElement('div',{className:'card-header'},
            React.createElement('div',{style:{display:'flex',alignItems:'center',gap:12}},
              React.createElement('div',{className:'user-avatar',style:{width:42,height:42,fontSize:14}},initials(u.name)),
              React.createElement('div',null,React.createElement('div',{style:{fontWeight:600,fontSize:14,color:'var(--text)'}},u.name),React.createElement('div',{style:{fontSize:11,color:'var(--text-dim)'}},u.email)),
            ),
            React.createElement('button',{className:'btn btn-danger btn-sm',onClick:()=>removeUser(u.id)},'Remove'),
          ),
          React.createElement('div',{style:{display:'flex',flexWrap:'wrap'}},
            plans.filter(p=>(p.assignedTo||[]).includes(u.id)).map(p=>React.createElement('div',{key:p.id,className:'plan-chip'},SECTIONS[p.section].icon+' '+p.title)),
          ),
          plans.filter(p=>(p.assignedTo||[]).includes(u.id)).length===0&&React.createElement('span',{style:{fontSize:12,color:'var(--text-dim)'}},'No plans assigned yet'),
        )),
  );
}

function AuthScreen({ onLogin }) {
  const [tab, setTab] = useState('login');
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [name, setName] = useState('');
  const [err, setErr] = useState('');
  const login = () => {
    setErr('');
    const u = DB.get('users',[]).find(u=>u.email===email&&u.password===pw);
    if (!u) return setErr('Invalid credentials.');
    onLogin(u);
  };
  const register = () => {
    setErr('');
    if (!name.trim()||!email.trim()||!pw.trim()) return setErr('All fields required.');
    if (pw.length<6) return setErr('Password min 6 characters.');
    const users = DB.get('users',[]);
    if (users.find(u=>u.email===email)) return setErr('Email already registered.');
    const u = { id:Date.now().toString(), email, password:pw, name:name.trim(), role:'user' };
    DB.set('users',[...users,u]);
    addNotification(u.id,'🔥 Welcome to Cancer PhoenX, '+u.name.split(' ')[0]+'. You are a warrior. Your healing journey begins now.','welcome');
    onLogin(u);
  };
  return React.createElement('div', { className:'auth-screen' },
    React.createElement('div', { className:'auth-box' },
      React.createElement('div', { className:'auth-logo-wrap' },
        React.createElement('div', { className:'phoenix-img-wrap' },
          React.createElement('img', { src:PHOENIX_LOGIN_IMG, alt:'Cancer PhoenX Phoenix' }),
        ),
        React.createElement('div', { className:'auth-title', style:{marginTop:'0.75rem'} }, 'Cancer PhoenX'),
        React.createElement('div', { className:'auth-sub' }, 'Rise From Ash'),
      ),
      React.createElement('div', { className:'auth-tabs' },
        React.createElement('button', { className:'auth-tab '+(tab==='login'?'active':''), onClick:()=>{setTab('login');setErr('');} }, 'Sign In'),
        React.createElement('button', { className:'auth-tab '+(tab==='register'?'active':''), onClick:()=>{setTab('register');setErr('');} }, 'Register'),
      ),
      err&&React.createElement('div', { className:'err' }, err),
      tab==='register'&&React.createElement(React.Fragment, null,
        React.createElement('label', null, 'Full name'),
        React.createElement('input', { type:'text', placeholder:'Jane Smith', value:name, onChange:e=>setName(e.target.value) }),
      ),
      React.createElement('label', null, 'Email'),
      React.createElement('input', { type:'email', placeholder:'warrior@email.com', value:email, onChange:e=>setEmail(e.target.value) }),
      React.createElement('label', null, 'Password'),
      React.createElement('input', { type:'password', placeholder:'••••••••', value:pw, onChange:e=>setPw(e.target.value), onKeyDown:e=>e.key==='Enter'&&(tab==='login'?login():register()) }),
      React.createElement('button', { className:'btn btn-fire', style:{marginTop:'0.75rem'}, onClick:tab==='login'?login:register }, 'Login'),
      tab==='login'&&React.createElement('p',{style:{fontSize:11,color:'rgba(255,255,255,0.35)',marginTop:'1rem',textAlign:'center'}},'Admin demo: admin@cancerphonenx.com / phoenix123'),
    )
  );
}

function App() {
  useEffect(()=>initStorage(),[]);
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('today');
  const [showNotif, setShowNotif] = useState(false);
  const [notifCount, setNotifCount] = useState(0);
  const refreshNotifCount = useCallback(()=>{ if(!user)return; const n=DB.get('notifications',[]).filter(n=>(n.userId===user.id||n.userId==='all')&&!n.read).length; setNotifCount(n); },[user]);
  useEffect(()=>{ refreshNotifCount(); const t=setInterval(refreshNotifCount,5000); return()=>clearInterval(t); },[refreshNotifCount]);
  if (!user) return React.createElement(AuthScreen,{onLogin:u=>{setUser(u);setPage(u.role==='admin'?'adminPlans':'today');}});
  const isAdmin = user.role==='admin';
  const navGroups = isAdmin
    ? [{label:'Admin',items:[{key:'adminPlans',label:'Plans',icon:'📜'},{key:'adminUsers',label:'Warriors',icon:'⚡'}]}]
    : [{label:'Overview',items:[{key:'today',label:"Today's Protocol",icon:'🔥'}]},{label:'Protocols',items:[{key:'workout',label:'Workout',icon:'💪'},{key:'detox',label:'Detox',icon:'🌿'},{key:'supplement',label:'Supplement',icon:'⚡'}]}];
  const renderPage = ()=>{
    if(page==='today') return React.createElement(TodayPage,{user});
    if(page==='workout') return React.createElement(SectionPage,{user,section:'workout'});
    if(page==='detox') return React.createElement(SectionPage,{user,section:'detox'});
    if(page==='supplement') return React.createElement(SectionPage,{user,section:'supplement'});
    if(page==='adminPlans') return React.createElement(AdminPlansPage);
    if(page==='adminUsers') return React.createElement(AdminUsersPage);
  };
  return React.createElement('div', { className:'app-layout' },
    React.createElement('div', { className:'topbar' },
      React.createElement('div', { className:'topbar-logo' },
        React.createElement('div', { className:'topbar-phoenix-img' },
          React.createElement('img', { src:PHOENIX_ICON_IMG, alt:'PhoenX' }),
        ),
        'Cancer PhoenX',
      ),
      React.createElement('div', { className:'topbar-right' },
        !isAdmin&&React.createElement('div', { style:{position:'relative'} },
          React.createElement('button', { className:'notif-btn', onClick:()=>setShowNotif(s=>!s) }, '🔔',
            notifCount>0&&React.createElement('span',{className:'notif-badge'},notifCount>9?'9+':notifCount)
          ),
          showNotif&&React.createElement(NotifPanel,{user,onClose:()=>setShowNotif(false),onRead:refreshNotifCount}),
        ),
        React.createElement('div', { className:'user-pill' },
          React.createElement('div', { className:'user-avatar' }, initials(user.name)),
          React.createElement('span', null, user.name),
          isAdmin&&React.createElement('span',{className:'admin-badge'},'Admin'),
        ),
        React.createElement('button', { className:'btn btn-ghost btn-sm', onClick:()=>{setUser(null);setShowNotif(false);} }, 'Sign out'),
      ),
    ),
    React.createElement('div', { className:'main-content' },
      React.createElement('nav', { className:'sidebar' },
        navGroups.map(g=>React.createElement(React.Fragment,{key:g.label},
          React.createElement('div',{className:'nav-section-label'},g.label),
          g.items.map(item=>React.createElement('button',{key:item.key,className:'nav-item '+(page===item.key?'active':''),onClick:()=>setPage(item.key)},
            React.createElement('span',{className:'nav-icon'},item.icon),item.label
          ))
        ))
      ),
      renderPage(),
    ),
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
